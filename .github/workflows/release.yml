# Release workflow — runs in the PUBLIC mirror repo
# (github.com/browzeremb/browzer-cli) on tag push.
#
# This file lives at packages/cli/.github/workflows/release.yml in the
# private monorepo so the mirror action carries it across to
# .github/workflows/release.yml in the public repo (the mirror writes
# packages/cli/* into the root of the public repo, so this path becomes
# .github/workflows/release.yml on the other side).
name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # HOMEBREW_TAP_TOKEN must have write access to
          # browzeremb/homebrew-tap and browzeremb/scoop-bucket.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          SCOOP_BUCKET_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
